<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER PUNCH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/cyborgICON.png">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menuContent">
            <h1>CYBER PUNCH</h1>
            <button id="startBtn">START</button>
        </div>
    </div>

    <!-- HEALTH BARS -->
    <div id="health-bars">
        <div id="p1Bar" class="player-ui-box">
            <img class="character-icon" src="images/cyborgICON.png">
            <p class="player-label">P1: Cyborg</p>
            <div class="health-frame">
                <div id="p1healthFill"></div>
            </div>
        </div>

        <div id="p2Bar" class="player-ui-box p2-flipped">
            <img class="character-icon" src="images/bikerICON.png">
            <p class="player-label">P2: Biker</p>
            <div class="health-frame">
                <div id="p2healthFill"></div>
            </div>
        </div>
    </div>

    <!-- MENU BUTTON -->
    <button id="menuBtn">≡</button>

    <!-- PAUSE MENU -->
    <div id="menuPanel">
        <h2>Paused</h2>
        <p>Press ESC to resume</p>
        <div class="settingsSection">
            <button class="setting">Switch Background</button>
            <button class="setting">???</button>
            <button class="setting">???</button>
        </div>
    </div>

    <script src="cyborg.js"></script>
    <script src="biker.js"></script>
    <script src="code.js"></script>
</body>
</html>
